services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: failms-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public
      - panel-internal
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Router principale: failms.org
      - "traefik.http.routers.confial.rule=Host(`failms.org`)"
      - "traefik.http.routers.confial.entrypoints=websecure"
      - "traefik.http.routers.confial.tls.certresolver=letsencrypt"
      - "traefik.http.routers.confial.middlewares=confial-www-redirect,security-headers@file,compress@file"
      - "traefik.http.services.confial.loadbalancer.server.port=3020"
      # Router www redirect
      - "traefik.http.routers.confial-www.rule=Host(`www.failms.org`)"
      - "traefik.http.routers.confial-www.entrypoints=websecure"
      - "traefik.http.routers.confial-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.confial-www.middlewares=confial-www-redirect"
      - "traefik.http.routers.confial-www.service=confial"
      # Router HTTP redirect
      - "traefik.http.routers.confial-http.rule=Host(`failms.org`) || Host(`www.failms.org`)"
      - "traefik.http.routers.confial-http.entrypoints=web"
      - "traefik.http.routers.confial-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.confial-http.service=confial"
      # Middleware: www -> non-www
      - "traefik.http.middlewares.confial-www-redirect.redirectregex.regex=^https://www\\.failms\\.org/(.*)"
      - "traefik.http.middlewares.confial-www-redirect.redirectregex.replacement=https://failms.org/$${1}"
      - "traefik.http.middlewares.confial-www-redirect.redirectregex.permanent=true"
    volumes:
      - nextcache:/app/.next/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3020"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:18-alpine
    container_name: failms-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5441:5432"
    environment:
      POSTGRES_USER: confial_user
      POSTGRES_PASSWORD: xK9mNpL2vQ7wR4tY8uZ3aB6cD0eF5gH1
      POSTGRES_DB: confial_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confial_user -d confial_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  nextcache:
  postgres-data:

networks:
  traefik-public:
    external: true
  panel-internal:
    external: true
