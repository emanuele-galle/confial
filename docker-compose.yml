version: '3.8'

services:
  postgres:
    labels:
      - "traefik.http.routers.failms-org.rule=Host(`failms.org`)"
      - "traefik.http.routers.failms-org.entrypoints=websecure"
      - "traefik.http.routers.failms-org.tls=true"
      - "traefik.http.routers.failms-org.tls.certresolver=letsencrypt"
    image: postgres:18-alpine
    container_name: confial-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5441:5432"
    environment:
      POSTGRES_USER: confial_user
      POSTGRES_PASSWORD: xK9mNpL2vQ7wR4tY8uZ3aB6cD0eF5gH1
      POSTGRES_DB: confial_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confial_user -d confial_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:

networks:
  traefik-public:
    external: true
